# ============================================================
# Nginx config for the Arin eLearning backend
# Place at: /etc/nginx/sites-available/elearning-backend
# Then: sudo ln -sf /etc/nginx/sites-available/elearning-backend \
#                    /etc/nginx/sites-enabled/elearning-backend
#       sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Upstream NestJS app (adjust port if needed)
upstream nestjs_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    server_name api.elearning.arin-africa.org;   # ← change to your actual API domain
    return 301 https://$host$request_uri;
}

# ── HTTPS main block ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.elearning.arin-africa.org;   # ← change to your actual API domain

    # SSL certificates (Certbot / Let's Encrypt path)
    ssl_certificate     /etc/letsencrypt/live/api.elearning.arin-africa.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.elearning.arin-africa.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── FIX: allow large uploads (images, PDFs, videos) ───
    client_max_body_size 100M;

    # ── Timeouts for slow uploads ──────────────────────────
    client_body_timeout        120s;
    proxy_read_timeout         120s;
    proxy_connect_timeout      60s;
    proxy_send_timeout         120s;
    send_timeout               120s;

    # ── Gzip for API responses ─────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # ── Proxy all traffic to NestJS ───────────────────────
    location / {
        proxy_pass         http://nestjs_backend;
        proxy_http_version 1.1;

        # Required for WebSockets (if you use them)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large request bodies to pass through
        proxy_request_buffering off;
    }

    # ── Serve uploaded static files directly from disk ────
    location /uploads/ {
        alias /path/to/elearning-backend/uploads/;  # ← update with actual path
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
